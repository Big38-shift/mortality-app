[build]
  base = "."
  command = "npm run build"
  publish = "dist"

[build.environment]
  VITE_API_URL = "https://mortality-app.onrender.com"

[[redirects]]
  from = "/api/*"
  to = "https://mortality-app.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200