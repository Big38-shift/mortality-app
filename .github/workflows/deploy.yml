name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # Backend Tests
  backend-tests:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('mortality_backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          cd mortality_backend
          pip install -r requirements.txt
      
      - name: Run backend tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          SECRET_KEY: test-secret-key-for-ci
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 30
        run: |
          cd mortality_backend
          pytest tests/ -v --tb=short
      
      - name: Lint Python code
        run: |
          cd mortality_backend
          python -m pytest --collect-only > /dev/null || echo "Tests ready"

  # Frontend Tests
  frontend-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mortality_frontend/package-lock.json
      
      - name: Install dependencies
        run: |
          cd mortality_frontend
          npm ci
      
      - name: Build frontend
        run: |
          cd mortality_frontend
          npm run build
      
      - name: Run linting
        run: |
          cd mortality_frontend
          npm run lint || true

  # Auto-deploy to Render & Vercel
  deploy:
    needs: [backend-tests, frontend-tests]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4
      
      - name: Trigger Render Deployment
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        if: env.RENDER_DEPLOY_HOOK != ''
        run: |
          curl -X POST $RENDER_DEPLOY_HOOK
      
      - name: Trigger Vercel Deployment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        if: env.VERCEL_TOKEN != ''
        run: |
          npm install -g vercel
          vercel --prod --token=$VERCEL_TOKEN
        working-directory: mortality_frontend

  # Notification
  notify:
    needs: [deploy]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Deployment Status
        run: |
          echo "✅ Deployment pipeline completed"
          echo "Backend: https://mortality-predictor-api.onrender.com"
          echo "Frontend: https://mortality-predictor.vercel.app"
